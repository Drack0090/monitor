name: Monitor ITLA Solicitud

on:
  schedule:
    # Corre cada 5 minutos
    - cron: "*/5 * * * *"
  workflow_dispatch: # Permite correrlo manualmente también

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: pip install requests selenium

      - name: Instalar Chrome y ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Restaurar estado anterior (caché)
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: itla-last-state-${{ github.ref }}
          restore-keys: |
            itla-last-state-

      - name: Ejecutar monitor
        env:
          ITLA_WEBHOOK: ${{ secrets.ITLA_WEBHOOK }}
        run: python monitor.py

      - name: Guardar nuevo estado en caché
        uses: actions/cache@v4
        if: always()
        with:
          path: last_state.json
          key: itla-last-state-${{ github.ref }}-${{ github.run_id }}
