name: Monitor ITLA Solicitud

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Permiso para que el workflow pueda hacer commit al repo
permissions:
  contents: write

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests selenium

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Ejecutar monitor
        env:
          ITLA_WEBHOOK: ${{ secrets.ITLA_WEBHOOK }}
        run: python monitor.py

      # Si last_state.json cambió, hacer commit para persistir el estado
      - name: Guardar estado en el repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el estado, no se hace commit."
          else
            git commit -m "chore: actualizar last_state.json [skip ci]"
            git push
          fi
